<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Network | DevDreamix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* Info Panel */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 350px;
            max-width: calc(100vw - 40px);
            background: rgba(5, 5, 15, 0.95);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(20px);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            z-index: 100;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        #info-panel.active {
            transform: translateX(0);
        }
        
        @media (max-width: 768px) {
            #info-panel {
                width: calc(100vw - 20px);
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 120px;
                transform: translateY(150%);
                max-height: 45vh;
            }
            
            #info-panel.active {
                transform: translateY(0);
            }
        }
        
        #info-panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }
        
        #info-panel .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }
        
        #info-panel .label {
            color: #888;
        }
        
        #info-panel .value {
            color: #fff;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
        }
        
        #info-panel .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        .status.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status.busy { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        #info-panel .description {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.3);
            color: #aaa;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: transparent;
            border: 1px solid #ff0044;
            color: #ff0044;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: #ff0044;
            color: #fff;
        }
        
        /* Controls */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(5, 5, 15, 0.8);
            padding: 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }
        
        #controls button {
            background: transparent;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 12px 24px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            border-radius: 25px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            min-width: 100px;
        }
        
        #controls button:hover {
            background: rgba(255, 0, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4);
        }
        
        #controls button:active {
            transform: translateY(0) scale(0.95);
        }
        
        #controls button.active {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff;
        }
        
        @media (max-width: 768px) {
            #controls {
                bottom: 10px;
                padding: 10px;
                gap: 10px;
                width: calc(100% - 20px);
                justify-content: center;
            }
            
            #controls button {
                padding: 14px 20px;
                font-size: 11px;
                min-width: 80px;
                flex: 1;
                max-width: 120px;
            }
        }
        
        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00d4ff;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 13px;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        /* Stats */
        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 12px;
            background: rgba(5, 5, 15, 0.8);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            #stats {
                top: 10px;
                left: 10px;
                font-size: 11px;
                padding: 10px 14px;
            }
        }
        
        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 24px;
            text-align: center;
            z-index: 1000;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .loading::after {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: #00d4ff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Zoom hint */
        #zoom-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s;
            z-index: 50;
        }
        
        #zoom-hint.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="loading">Загрузка сети...</div>
    </div>
    
    <div id="zoom-hint">
        🖱️ Колёсико / 📱 Пинч для приближения<br>
        🖱️ ЛКМ / 📱 Свайп для вращения
    </div>
    
    <div id="tooltip"></div>
    
    <div id="stats">
        🌍 Узлы: <span id="node-count">0</span> | 
        🔗 Связи: <span id="conn-count">0</span> | 
        📊 FPS: <span id="fps">0</span>
    </div>
    
    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <h2 id="panel-title">Выберите объект</h2>
        <div id="panel-content">
            <p style="color: #666; font-size: 12px;">Кликните на узел сети</p>
        </div>
    </div>
    
    <div id="controls">
        <button id="btn-reset" onclick="resetView()">🌍 Земля</button>
        <button id="btn-rotate" onclick="toggleRotation()">🔄 Вращение</button>
        <button id="btn-particles" onclick="toggleParticles()">✨ Частицы</button>
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.001);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 180);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 45;
        controls.maxDistance = 500;
        controls.enablePan = false;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 0.5;
        
        // Touch optimization
        controls.touches = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_ROTATE
        };
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(100, 50, 50);
        scene.add(sunLight);
        
        const blueLight = new THREE.PointLight(0x00d4ff, 0.8, 200);
        blueLight.position.set(-50, 0, 50);
        scene.add(blueLight);
        
        // Data structures
        const nodes = [];
        const connections = [];
        const particles = [];
        let showParticles = true;
        let selectedObject = null;
        
        // Raycaster
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 1;
        const mouse = new THREE.Vector2();
        
        // Create Earth
        function createEarth() {
            const earthGroup = new THREE.Group();
            
            // Main sphere
            const earthGeo = new THREE.SphereGeometry(40, 64, 64);
            
            // Create earth texture programmatically
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Ocean
            const gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#001a33');
            gradient.addColorStop(0.5, '#003d66');
            gradient.addColorStop(1, '#001a33');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1024, 512);
            
            // Continents (simplified shapes)
            ctx.fillStyle = '#0d4d1a';
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 512;
                const w = 50 + Math.random() * 150;
                const h = 30 + Math.random() * 100;
                ctx.beginPath();
                ctx.ellipse(x, y, w, h, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Grid lines
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 1024; i += 64) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 512);
                ctx.stroke();
            }
            for (let i = 0; i <= 512; i += 64) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(1024, i);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            
            const earthMat = new THREE.MeshPhongMaterial({
                map: texture,
                emissive: 0x001133,
                emissiveIntensity: 0.2,
                specular: 0x111111,
                shininess: 10
            });
            
            const earth = new THREE.Mesh(earthGeo, earthMat);
            earthGroup.add(earth);
            
            // Atmosphere glow
            const atmoGeo = new THREE.SphereGeometry(42, 64, 64);
            const atmoMat = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
            earthGroup.add(atmosphere);
            
            // Outer glow
            const glowGeo = new THREE.SphereGeometry(45, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.05,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            earthGroup.add(glow);
            
            scene.add(earthGroup);
            return earthGroup;
        }
        
        const earth = createEarth();
        
        // Convert lat/lon to 3D position
        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            
            return new THREE.Vector3(x, y, z);
        }
        
        // Create network node on Earth surface
        function createSurfaceNode(lat, lon, data) {
            const position = latLonToVector3(lat, lon, 42);
            const normal = position.clone().normalize();
            
            const group = new THREE.Group();
            group.position.copy(position);
            group.lookAt(position.clone().add(normal));
            
            const color = data.color || 0x00d4ff;
            const size = data.size || 1;
            
            // Main node (crystal shape)
            const geo = new THREE.OctahedronGeometry(size, 0);
            const mat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.9
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { type: 'node', ...data, lat, lon };
            group.add(mesh);
            
            // Glow ring
            const ringGeo = new THREE.RingGeometry(size * 1.5, size * 2, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.lookAt(position.clone().add(normal));
            group.add(ring);
            
            // Vertical beam to sky
            const beamGeo = new THREE.CylinderGeometry(0.1, 0.3, 15, 8);
            const beamMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.3
            });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.z = 7.5;
            group.add(beam);
            
            // Pulse animation
            gsap.to(mesh.scale, {
                x: 1.3, y: 1.3, z: 1.3,
                duration: 1 + Math.random(),
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
            
            gsap.to(ring.rotation, {
                z: Math.PI * 2,
                duration: 3,
                repeat: -1,
                ease: "none"
            });
            
            group.userData = { mainMesh: mesh, ring, ...data };
            scene.add(group);
            nodes.push(group);
            
            return group;
        }
        
        // Create connection arc between surface points
        function createArcConnection(startNode, endNode, data) {
            const start = startNode.position;
            const end = endNode.position;
            
            // Calculate arc height based on distance
            const distance = start.distanceTo(end);
            const arcHeight = 10 + distance * 0.3;
            
            // Create quadratic curve for arc
            const mid = start.clone().add(end).multiplyScalar(0.5);
            mid.add(mid.clone().normalize().multiplyScalar(arcHeight));
            
            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
            const points = curve.getPoints(100);
            
            // Create gradient line
            const positions = new Float32Array(points.length * 3);
            const colors = new Float32Array(points.length * 3);
            
            for (let i = 0; i < points.length; i++) {
                positions[i * 3] = points[i].x;
                positions[i * 3 + 1] = points[i].y;
                positions[i * 3 + 2] = points[i].z;
                
                // Gradient: cyan -> white -> yellow
                const t = i / points.length;
                if (t < 0.5) {
                    colors[i * 3] = 0;
                    colors[i * 3 + 1] = 0.8 + t * 0.4;
                    colors[i * 3 + 2] = 1;
                } else {
                    colors[i * 3] = 1;
                    colors[i * 3 + 1] = 1 - (t - 0.5) * 0.3;
                    colors[i * 3 + 2] = 1 - (t - 0.5) * 0.8;
                }
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                linewidth: 2
            });
            
            const line = new THREE.Line(geometry, material);
            line.userData = {
                type: 'connection',
                startNode,
                endNode,
                curve,
                ...data
            };
            
            scene.add(line);
            connections.push(line);
            
            // Data packets moving along arc
            const packetCount = 2;
            for (let i = 0; i < packetCount; i++) {
                const packetGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const packetMat = new THREE.MeshBasicMaterial({
                    color: 0xffffaa,
                    emissive: 0xffff00,
                    emissiveIntensity: 2
                });
                const packet = new THREE.Mesh(packetGeo, packetMat);
                packet.userData = {
                    curve,
                    t: i / packetCount,
                    speed: 0.002 + Math.random() * 0.001
                };
                scene.add(packet);
            }
            
            // Particle flow
            const particleCount = 40;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            const particleData = [];
            
            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const point = curve.getPoint(t);
                particlePositions[i * 3] = point.x;
                particlePositions[i * 3 + 1] = point.y;
                particlePositions[i * 3 + 2] = point.z;
                
                particleData.push({
                    t: t,
                    speed: 0.001 + Math.random() * 0.001
                });
            }
            
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMat = new THREE.PointsMaterial({
                color: 0xffffaa,
                size: 0.4,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            
            const particleSystem = new THREE.Points(particleGeo, particleMat);
            particleSystem.userData = { curve, particleData };
            scene.add(particleSystem);
            particles.push(particleSystem);
            
            return line;
        }
        
        // Build global network
        function buildGlobalNetwork() {
            // Major hubs (cities)
            const hubs = [
                { lat: 55.7558, lon: 37.6173, name: 'Moscow', region: 'RU-Central', color: 0xff00ff },
                { lat: 59.9343, lon: 30.3351, name: 'St. Petersburg', region: 'RU-North', color: 0xff00ff },
                { lat: 52.5200, lon: 13.4050, name: 'Berlin', region: 'EU-West', color: 0x00d4ff },
                { lat: 48.8566, lon: 2.3522, name: 'Paris', region: 'EU-West', color: 0x00d4ff },
                { lat: 51.5074, lon: -0.1278, name: 'London', region: 'EU-West', color: 0x00d4ff },
                { lat: 40.7128, lon: -74.0060, name: 'New York', region: 'US-East', color: 0x00ff88 },
                { lat: 37.7749, lon: -122.4194, name: 'San Francisco', region: 'US-West', color: 0x00ff88 },
                { lat: 35.6762, lon: 139.6503, name: 'Tokyo', region: 'Asia-East', color: 0xffaa00 },
                { lat: 39.9042, lon: 116.4074, name: 'Beijing', region: 'Asia-East', color: 0xffaa00 },
                { lat: 1.3521, lon: 103.8198, name: 'Singapore', region: 'Asia-South', color: 0xffaa00 },
                { lat: -33.8688, lon: 151.2093, name: 'Sydney', region: 'AU', color: 0xff6600 },
                { lat: 25.2048, lon: 55.2708, name: 'Dubai', region: 'ME', color: 0xff00ff }
            ];
            
            const hubNodes = hubs.map(h => createSurfaceNode(h.lat, h.lon, {
                name: h.name,
                type: 'hub',
                region: h.region,
                ip: `10.${Math.floor(Math.random() * 255)}.0.1`,
                status: 'online',
                load: Math.floor(Math.random() * 60 + 20) + '%',
                bandwidth: '100 Gbps',
                connections: Math.floor(Math.random() * 100 + 50),
                color: h.color,
                size: 1.5,
                description: `Основной узел сети в ${h.name}. Маршрутизатор высокой пропускной способности.`
            }));
            
            // Connect all hubs (backbone)
            for (let i = 0; i < hubNodes.length; i++) {
                for (let j = i + 1; j < hubNodes.length; j++) {
                    if (Math.random() > 0.4) {
                        createArcConnection(hubNodes[i], hubNodes[j], {
                            name: `Backbone: ${hubNodes[i].userData.name} ↔ ${hubNodes[j].userData.name}`,
                            type: 'backbone',
                            bandwidth: '100 Gbps',
                            latency: `${Math.floor(Math.random() * 100 + 20)}ms`,
                            protocol: 'VLESS/XTLS',
                            description: 'Магистральное соединение между региональными хабами.'
                        });
                    }
                }
            }
            
            // Client nodes (smaller cities)
            const clients = [];
            for (let i = 0; i < 30; i++) {
                const lat = (Math.random() - 0.5) * 160;
                const lon = (Math.random() - 0.5) * 360;
                
                // Find nearest hub
                const nearestHub = hubNodes.reduce((prev, curr) => {
                    const prevPos = latLonToVector3(lat, lon, 42);
                    const prevDist = prevPos.distanceTo(prev.position);
                    const currDist = prevPos.distanceTo(curr.position);
                    return prevDist < currDist ? prev : curr;
                });
                
                const client = createSurfaceNode(lat, lon, {
                    name: `Client-${String(i + 1).padStart(3, '0')}`,
                    type: 'client',
                    region: nearestHub.userData.region,
                    ip: `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                    status: 'online',
                    vpn: 'Connected',
                    server: nearestHub.userData.name,
                    color: 0x888888,
                    size: 0.6,
                    description: `Клиентское подключение через VPN к узлу ${nearestHub.userData.name}.`
                });
                
                clients.push(client);
                
                // Connect to nearest hub
                createArcConnection(client, nearestHub, {
                    name: 'VPN Tunnel',
                    type: 'tunnel',
                    bandwidth: '1 Gbps',
                    latency: `${Math.floor(Math.random() * 50 + 10)}ms`,
                    protocol: 'VLESS/Reality',
                    encryption: 'XTLS-Vision',
                    description: 'Зашифрованный VPN-туннель до ближайшего хаба.'
                });
            }
            
            // Update stats
            document.getElementById('node-count').textContent = nodes.length;
            document.getElementById('conn-count').textContent = connections.length;
            document.querySelector('.loading').style.display = 'none';
            
            // Hide hint after 3 seconds
            setTimeout(() => {
                document.getElementById('zoom-hint').classList.add('hidden');
            }, 3000);
        }
        
        // Interaction
        function onPointerDown(event) {
            event.preventDefault();
            
            const clientX = event.clientX || (event.touches && event.touches[0].clientX);
            const clientY = event.clientY || (event.touches && event.touches[0].clientY);
            
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // Check nodes
            const nodeMeshes = [];
            nodes.forEach(node => {
                node.traverse(child => {
                    if (child.isMesh && child.userData.type === 'node') {
                        child.parentGroup = node;
                        nodeMeshes.push(child);
                    }
                });
            });
            
            const nodeIntersects = raycaster.intersectObjects(nodeMeshes);
            if (nodeIntersects.length > 0) {
                selectObject(nodeIntersects[0].object.parentGroup);
                return;
            }
            
            // Check connections
            const connIntersects = raycaster.intersectObjects(connections);
            if (connIntersects.length > 0) {
                selectObject(connIntersects[0].object);
                return;
            }
            
            closePanel();
        }
        
        function onPointerMove(event) {
            const clientX = event.clientX || (event.touches && event.touches[0].clientX);
            const clientY = event.clientY || (event.touches && event.touches[0].clientY);
            
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const nodeMeshes = [];
            nodes.forEach(node => {
                node.traverse(child => {
                    if (child.isMesh && child.userData.type === 'node') {
                        child.parentGroup = node;
                        nodeMeshes.push(child);
                    }
                });
            });
            
            const intersects = raycaster.intersectObjects([...nodeMeshes, ...connections]);
            
            const tooltip = document.getElementById('tooltip');
            if (intersects.length > 0) {
                const obj = intersects[0].object.parentGroup || intersects[0].object;
                tooltip.style.opacity = '1';
                tooltip.style.left = clientX + 15 + 'px';
                tooltip.style.top = clientY + 15 + 'px';
                tooltip.textContent = obj.userData.name || 'Connection';
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.style.opacity = '0';
                document.body.style.cursor = 'default';
            }
        }
        
        function selectObject(object) {
            if (selectedObject) {
                if (selectedObject.userData.mainMesh) {
                    gsap.to(selectedObject.userData.mainMesh.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                }
            }
            
            selectedObject = object;
            
            if (object.userData.mainMesh) {
                gsap.to(object.userData.mainMesh.scale, { x: 2, y: 2, z: 2, duration: 0.3, ease: "back.out(1.7)" });
            }
            
            const panel = document.getElementById('info-panel');
            const content = document.getElementById('panel-content');
            const title = document.getElementById('panel-title');
            
            title.textContent = object.userData.name;
            
            let html = '';
            const data = object.userData;
            
            if (data.type === 'node') {
                html = `
                    <div class="info-row">
                        <span class="label">Тип</span>
                        <span class="value">${data.type === 'hub' ? '🌐 HUB' : '📱 CLIENT'}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Регион</span>
                        <span class="value">${data.region}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Координаты</span>
                        <span class="value">${data.lat?.toFixed(2) || 'N/A'}°, ${data.lon?.toFixed(2) || 'N/A'}°</span>
                    </div>
                    <div class="info-row">
                        <span class="label">IP</span>
                        <span class="value">${data.ip}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Статус</span>
                        <span class="value"><span class="status ${data.status}"></span>${data.status.toUpperCase()}</span>
                    </div>
                    ${data.load !== 'N/A' ? `
                    <div class="info-row">
                        <span class="label">Загрузка</span>
                        <span class="value" style="color: ${parseInt(data.load) > 70 ? '#ffaa00' : '#00ff88'}">${data.load}</span>
                    </div>
                    ` : ''}
                    ${data.vpn ? `
                    <div class="info-row">
                        <span class="label">VPN</span>
                        <span class="value" style="color: #00ff88">${data.vpn}</span>
                    </div>
                    ` : ''}
                    <div class="description">${data.description}</div>
                `;
            } else if (data.type === 'connection') {
                html = `
                    <div class="info-row">
                        <span class="label">Тип</span>
                        <span class="value">${data.type.toUpperCase()}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Из</span>
                        <span class="value">${data.startNode.userData.name}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">В</span>
                        <span class="value">${data.endNode.userData.name}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Пропускная способность</span>
                        <span class="value">${data.bandwidth}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Задержка</span>
                        <span class="value" style="color: ${parseInt(data.latency) < 30 ? '#00ff88' : '#ffaa00'}">${data.latency}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Протокол</span>
                        <span class="value" style="color: #ff00ff">${data.protocol}</span>
                    </div>
                    <div class="description">${data.description}</div>
                `;
            }
            
            content.innerHTML = html;
            panel.classList.add('active');
        }
        
        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
            if (selectedObject) {
                if (selectedObject.userData.mainMesh) {
                    gsap.to(selectedObject.userData.mainMesh.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                }
                selectedObject = null;
            }
        }
        
        // Controls
        function resetView() {
            gsap.to(camera.position, {
                x: 0, y: 0, z: 180,
                duration: 2,
                ease: "power2.inOut"
            });
            gsap.to(controls.target, {
                x: 0, y: 0, z: 0,
                duration: 2,
                ease: "power2.inOut"
            });
        }
        
        function toggleRotation() {
            controls.autoRotate = !controls.autoRotate;
            const btn = document.getElementById('btn-rotate');
            if (controls.autoRotate) {
                btn.classList.add('active');
                btn.innerHTML = '⏹️ Стоп';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '🔄 Вращение';
            }
        }
        
        function toggleParticles() {
            showParticles = !showParticles;
            particles.forEach(p => p.visible = showParticles);
            
            const btn = document.getElementById('btn-particles');
            if (showParticles) {
                btn.classList.add('active');
                btn.innerHTML = '✨ Частицы';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '❌ Без частиц';
            }
        }
        
        // Animation
        let lastTime = 0;
        let frameCount = 0;
        
        function animate(time) {
            requestAnimationFrame(animate);
            
            frameCount++;
            if (time - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = time;
            }
            
            // Rotate Earth slowly
            earth.rotation.y += 0.0005;
            
            // Animate particles along arcs
            if (showParticles) {
                particles.forEach(system => {
                    const positions = system.geometry.attributes.position.array;
                    const data = system.userData.particleData;
                    
                    for (let i = 0; i < data.length; i++) {
                        data[i].t += data[i].speed;
                        if (data[i].t > 1) data[i].t = 0;
                        
                        const point = system.userData.curve.getPoint(data[i].t);
                        positions[i * 3] = point.x;
                        positions[i * 3 + 1] = point.y;
                        positions[i * 3 + 2] = point.z;
                    }
                    
                    system.geometry.attributes.position.needsUpdate = true;
                });
            }
            
            // Update node positions to stick to rotating Earth
            nodes.forEach(node => {
                const lat = node.userData.lat;
                const lon = node.userData.lon + (earth.rotation.y * 180 / Math.PI);
                const newPos = latLonToVector3(lat, lon, 42);
                node.position.copy(newPos);
                node.lookAt(newPos.clone().add(newPos.clone().normalize()));
            });
            
            // Update connection curves
            connections.forEach((conn, idx) => {
                const start = conn.userData.startNode.position;
                const end = conn.userData.endNode.position;
                const distance = start.distanceTo(end);
                const arcHeight = 10 + distance * 0.3;
                
                const mid = start.clone().add(end).multiplyScalar(0.5);
                mid.add(mid.clone().normalize().multiplyScalar(arcHeight));
                
                const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
                const points = curve.getPoints(100);
                
                const positions = conn.geometry.attributes.position.array;
                for (let i = 0; i < points.length; i++) {
                    positions[i * 3] = points[i].x;
                    positions[i * 3 + 1] = points[i].y;
                    positions[i * 3 + 2] = points[i].z;
                }
                conn.geometry.attributes.position.needsUpdate = true;
                conn.userData.curve = curve;
                
                // Update associated particles
                if (particles[idx]) {
                    particles[idx].userData.curve = curve;
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Events
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        
        // Initialize
        buildGlobalNetwork();
        animate(0);
        
        // Set initial button state
        document.getElementById('btn-particles').classList.add('active');
    </script>
</body>
</html>
