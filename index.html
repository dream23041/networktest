<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Topology | DevDreamix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #020204;
            color: #fff;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* Info Panel - Adaptive */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            max-width: calc(100vw - 40px);
            background: rgba(5, 5, 10, 0.95);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(20px);
            transform: translateX(380px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        #info-panel.active {
            transform: translateX(0);
        }
        
        #info-panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }
        
        #info-panel .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }
        
        #info-panel .label {
            color: #888;
        }
        
        #info-panel .value {
            color: #fff;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }
        
        #info-panel .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        .status.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status.busy { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        .status.offline { background: #ff0044; box-shadow: 0 0 8px #ff0044; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        #info-panel .description {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.3);
            color: #aaa;
            font-size: 12px;
            line-height: 1.6;
        }
        
        /* Mobile panel */
        @media (max-width: 768px) {
            #info-panel {
                width: calc(100vw - 40px);
                right: 10px;
                left: 10px;
                top: auto;
                bottom: 100px;
                transform: translateY(150%);
                max-height: 50vh;
            }
            
            #info-panel.active {
                transform: translateY(0);
            }
        }
        
        /* Controls - Adaptive */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 100;
        }
        
        #controls button {
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            border-radius: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #controls button:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }
        
        #controls button:active {
            transform: scale(0.95);
        }
        
        #controls button.active {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        @media (max-width: 768px) {
            #controls {
                bottom: 10px;
                left: 10px;
                right: 10px;
                justify-content: center;
            }
            
            #controls button {
                padding: 12px 16px;
                font-size: 11px;
                flex: 1;
                min-width: 80px;
            }
        }
        
        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00d4ff;
            padding: 8px 12px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 12px;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        /* Stats */
        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 11px;
            opacity: 0.8;
            background: rgba(5, 5, 10, 0.8);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            #stats {
                top: 10px;
                left: 10px;
                font-size: 10px;
                padding: 8px 12px;
            }
        }
        
        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 20px;
            animation: blink 1.5s infinite;
            text-align: center;
            z-index: 1000;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Close button for panel */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: transparent;
            border: 1px solid #ff0044;
            color: #ff0044;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: #ff0044;
            color: #fff;
        }
        
        /* Legend */
        #legend {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(5, 5, 10, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            padding: 15px;
            font-size: 11px;
            z-index: 100;
        }
        
        #legend .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            color: #aaa;
        }
        
        #legend .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            #legend {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="loading">ИНИЦИАЛИЗАЦИЯ СЕТИ...</div>
    </div>
    
    <div id="tooltip"></div>
    
    <div id="stats">
        Nodes: <span id="node-count">0</span> | 
        Links: <span id="conn-count">0</span> | 
        FPS: <span id="fps">0</span>
    </div>
    
    <div id="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #00d4ff; box-shadow: 0 0 10px #00d4ff;"></div>
            <span>Core Server</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff00ff; box-shadow: 0 0 10px #ff00ff;"></div>
            <span>Router/Gateway</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffff00; box-shadow: 0 0 10px #ffff00;"></div>
            <span>Data Flow</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #888;"></div>
            <span>Client Device</span>
        </div>
    </div>
    
    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <h2 id="panel-title">Выберите объект</h2>
        <div id="panel-content">
            <p style="color: #666; font-size: 12px;">Кликните на сервер, роутер или соединение</p>
        </div>
    </div>
    
    <div id="controls">
        <button id="btn-reset" onclick="resetCamera()">Сброс</button>
        <button id="btn-rotate" onclick="toggleRotation()">Вращение</button>
        <button id="btn-particles" onclick="toggleParticles()">Частицы</button>
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020204, 0.015);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 35);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 80;
        controls.minDistance = 5;
        controls.enablePan = true;
        
        // Touch optimization
        controls.touches = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_PAN
        };
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);
        
        const pointLight1 = new THREE.PointLight(0x00d4ff, 1, 50);
        pointLight1.position.set(15, 15, 15);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xff00ff, 1, 50);
        pointLight2.position.set(-15, 10, -15);
        scene.add(pointLight2);
        
        // Data structures
        const nodes = [];
        const connections = [];
        const particles = [];
        let autoRotate = false;
        let showParticles = true;
        let selectedObject = null;
        
        // Raycaster
        const raycaster = new THREE.Raycaster();
        raycaster.params.Line.threshold = 0.5;
        const mouse = new THREE.Vector2();
        
        // Create realistic core (glowing sphere with layers)
        function createCore(position, data) {
            const group = new THREE.Group();
            group.position.copy(position);
            
            const color = data.color || 0x00d4ff;
            const size = data.size || 2;
            
            // Outer glow (atmospheric)
            const glowGeo = new THREE.SphereGeometry(size * 2, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            group.add(glow);
            
            // Middle glow
            const midGlowGeo = new THREE.SphereGeometry(size * 1.4, 32, 32);
            const midGlowMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.2
            });
            const midGlow = new THREE.Mesh(midGlowGeo, midGlowMat);
            group.add(midGlow);
            
            // Main sphere (wireframe style)
            const mainGeo = new THREE.IcosahedronGeometry(size, 2);
            const mainMat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.6,
                wireframe: true,
                transparent: true,
                opacity: 0.9
            });
            const main = new THREE.Mesh(mainGeo, mainMat);
            main.userData = { type: 'node', ...data };
            group.add(main);
            
            // Inner core (solid)
            const innerGeo = new THREE.IcosahedronGeometry(size * 0.6, 1);
            const innerMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.9
            });
            const inner = new THREE.Mesh(innerGeo, innerMat);
            group.add(inner);
            
            // Orbiting rings
            const ringGeo = new THREE.TorusGeometry(size * 1.2, 0.05, 8, 64);
            const ringMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.6
            });
            const ring1 = new THREE.Mesh(ringGeo, ringMat);
            ring1.rotation.x = Math.PI / 2;
            group.add(ring1);
            
            const ring2 = new THREE.Mesh(ringGeo, ringMat);
            ring2.rotation.x = Math.PI / 3;
            ring2.rotation.y = Math.PI / 4;
            group.add(ring2);
            
            // Animation data
            group.userData = { 
                mainMesh: main, 
                rings: [ring1, ring2],
                glows: [glow, midGlow],
                originalScale: 1,
                ...data 
            };
            
            scene.add(group);
            nodes.push(group);
            
            // Rotation animation
            gsap.to(group.rotation, {
                y: Math.PI * 2,
                duration: 30,
                repeat: -1,
                ease: "none"
            });
            
            gsap.to(ring1.rotation, {
                z: Math.PI * 2,
                duration: 10,
                repeat: -1,
                ease: "none"
            });
            
            return group;
        }
        
        // Create router node
        function createRouter(position, data) {
            const group = new THREE.Group();
            group.position.copy(position);
            
            const color = data.color || 0xff00ff;
            const size = data.size || 1.5;
            
            // Box shape for router
            const boxGeo = new THREE.BoxGeometry(size * 2, size, size * 1.5);
            const boxMat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.4,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.userData = { type: 'node', ...data };
            group.add(box);
            
            // Antennas
            const antGeo = new THREE.CylinderGeometry(0.05, 0.05, size, 8);
            const antMat = new THREE.MeshBasicMaterial({ color: color });
            
            const ant1 = new THREE.Mesh(antGeo, antMat);
            ant1.position.set(-size/2, size, 0);
            group.add(ant1);
            
            const ant2 = new THREE.Mesh(antGeo, antMat);
            ant2.position.set(size/2, size, 0);
            group.add(ant2);
            
            // LED indicators
            const ledGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const ledMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
            for (let i = 0; i < 3; i++) {
                const led = new THREE.Mesh(ledGeo, ledMat);
                led.position.set(-size/2 + i * size/2, size/2, size/2 + 0.1);
                group.add(led);
            }
            
            // Glow
            const glowGeo = new THREE.BoxGeometry(size * 2.5, size * 1.5, size * 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.1
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            group.add(glow);
            
            group.userData = { mainMesh: box, originalScale: 1, ...data };
            scene.add(group);
            nodes.push(group);
            
            return group;
        }
        
        // Create client device
        function createClient(position, data) {
            const group = new THREE.Group();
            group.position.copy(position);
            
            const color = data.color || 0x888888;
            const size = data.size || 0.8;
            
            let mesh;
            if (data.deviceType === 'phone') {
                // Phone shape
                const geo = new THREE.BoxGeometry(size * 0.6, size, size * 0.1);
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    wireframe: true
                });
                mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 6;
            } else {
                // Laptop/monitor
                const geo = new THREE.BoxGeometry(size * 1.5, size, size * 0.2);
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    wireframe: true
                });
                mesh = new THREE.Mesh(geo, mat);
            }
            
            mesh.userData = { type: 'node', ...data };
            group.add(mesh);
            
            // Small glow
            const glowGeo = new THREE.SphereGeometry(size * 0.8, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.15
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            group.add(glow);
            
            group.userData = { mainMesh: mesh, originalScale: 1, ...data };
            scene.add(group);
            nodes.push(group);
            
            return group;
        }
        
        // Create enhanced connection beam
        function createConnection(startNode, endNode, data) {
            const start = startNode.position;
            const end = endNode.position;
            
            // Create curve with natural bend
            const distance = start.distanceTo(end);
            const mid = start.clone().add(end).multiplyScalar(0.5);
            mid.y += Math.min(distance * 0.2, 5); // Natural sag
            
            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
            const points = curve.getPoints(100);
            
            // Main beam (white-yellow gradient effect)
            const beamGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(points.length * 3);
            const colors = new Float32Array(points.length * 3);
            
            for (let i = 0; i < points.length; i++) {
                positions[i * 3] = points[i].x;
                positions[i * 3 + 1] = points[i].y;
                positions[i * 3 + 2] = points[i].z;
                
                // Gradient from white to yellow
                const t = i / points.length;
                colors[i * 3] = 1;     // R
                colors[i * 3 + 1] = 1 - t * 0.3;  // G (slightly less for yellow)
                colors[i * 3 + 2] = 1 - t * 0.8;  // B (reduce for yellow)
            }
            
            beamGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            beamGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const beamMaterial = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                linewidth: 2
            });
            
            const beam = new THREE.Line(beamGeometry, beamMaterial);
            beam.userData = { 
                type: 'connection', 
                startNode, 
                endNode, 
                curve,
                ...data 
            };
            scene.add(beam);
            connections.push(beam);
            
            // Data packets (moving spheres)
            const packetCount = 3;
            for (let i = 0; i < packetCount; i++) {
                const packetGeo = new THREE.SphereGeometry(0.15, 8, 8);
                const packetMat = new THREE.MeshBasicMaterial({
                    color: 0xffffaa,
                    emissive: 0xffff00,
                    emissiveIntensity: 2
                });
                const packet = new THREE.Mesh(packetGeo, packetMat);
                packet.userData = { 
                    curve, 
                    t: i / packetCount, 
                    speed: 0.003 + Math.random() * 0.002,
                    direction: Math.random() > 0.5 ? 1 : -1
                };
                scene.add(packet);
            }
            
            // Particle flow along beam
            const particleCount = 30;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            const particleData = [];
            
            for (let i = 0; i < particleCount; i++) {
                const t = i / particleCount;
                const point = curve.getPoint(t);
                particlePositions[i * 3] = point.x;
                particlePositions[i * 3 + 1] = point.y;
                particlePositions[i * 3 + 2] = point.z;
                
                particleData.push({
                    t: t,
                    speed: 0.001 + Math.random() * 0.002,
                    wobble: Math.random() * Math.PI * 2
                });
            }
            
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMat = new THREE.PointsMaterial({
                color: 0xffffaa,
                size: 0.25,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            
            const particleSystem = new THREE.Points(particleGeo, particleMat);
            particleSystem.userData = { curve, particleData };
            scene.add(particleSystem);
            particles.push(particleSystem);
            
            return beam;
        }
        
        // Build realistic network topology
        function buildNetwork() {
            // 1. Core Server (center)
            const coreServer = createCore(new THREE.Vector3(0, 5, 0), {
                name: 'Core Server (Moscow)',
                type: 'server',
                role: 'core',
                ip: '10.0.0.1',
                status: 'online',
                load: '42%',
                color: 0x00d4ff,
                size: 3,
                cpu: 'Intel Xeon E5-2680',
                ram: '64 GB',
                uptime: '45 days',
                description: 'Центральный сервер инфраструктуры. Обрабатывает маршрутизацию между всеми узлами, хостит основные сервисы и базы данных.'
            });
            
            // 2. Regional Routers (middle layer)
            const routerPositions = [
                { pos: [15, 2, 0], region: 'EU-West', ip: '10.1.0.1' },
                { pos: [-15, 2, 0], region: 'RU-East', ip: '10.2.0.1' },
                { pos: [0, 2, 15], region: 'Asia', ip: '10.3.0.1' },
                { pos: [0, 2, -15], region: 'US-East', ip: '10.4.0.1' }
            ];
            
            const routers = routerPositions.map(r => 
                createRouter(new THREE.Vector3(...r.pos), {
                    name: `Router ${r.region}`,
                    type: 'router',
                    role: 'gateway',
                    ip: r.ip,
                    status: Math.random() > 0.3 ? 'online' : 'busy',
                    load: Math.floor(Math.random() * 60 + 20) + '%',
                    color: 0xff00ff,
                    size: 1.8,
                    bandwidth: '10 Gbps',
                    connections: Math.floor(Math.random() * 50 + 20),
                    description: `Шлюз ${r.region}. Обеспечивает связь между корневым сервером и локальными клиентами региона.`
                })
            );
            
            // Connect core to routers
            routers.forEach(router => {
                createConnection(coreServer, router, {
                    name: `Backbone: Core ↔ ${router.userData.name}`,
                    type: 'backbone',
                    bandwidth: '10 Gbps',
                    latency: `${Math.floor(Math.random() * 15 + 5)}ms`,
                    protocol: 'VLESS/XTLS',
                    encryption: 'XTLS-Vision',
                    description: 'Высокоскоростной магистральный канал с низкой задержкой и шифрованием.'
                });
            });
            
            // 3. Client devices (outer layer)
            const clients = [];
            const deviceTypes = ['phone', 'laptop'];
            
            routers.forEach((router, routerIndex) => {
                const clientCount = 4 + Math.floor(Math.random() * 4); // 4-7 clients per router
                
                for (let i = 0; i < clientCount; i++) {
                    const angle = (i / clientCount) * Math.PI * 2 + (routerIndex * Math.PI / 2);
                    const radius = 8 + Math.random() * 4;
                    const x = router.position.x + Math.cos(angle) * radius;
                    const z = router.position.z + Math.sin(angle) * radius;

            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);

            nodes.forEach(node => {
                node.traverse(child => {

                        child.parentGroup = node;
                        nodeMeshes.push(child);
                    }
                });
            });
            
            // Check nodes first
            const nodeIntersects = raycaster.intersectObjects(nodeMeshes);
            if (nodeIntersects.length > 0) {
                selectObject(nodeIntersects[0].object.parentGroup);
                return;
            }
            
            // Check connections
            const connIntersects = raycaster.intersectObjects(connections);
            if (connIntersects.length > 0) {
                selectObject(connIntersects[0].object);
                return;
            }
            
            closePanel();
        }
        
        function onPointerMove(event) {

                        child.parentGroup = node;
                        nodeMeshes.push(child);
                    }
                });
            });
            
            const intersects = raycaster.intersectObjects([...nodeMeshes, ...connections]);
            
            const tooltip = document.getElementById('tooltip');
            if (intersects.length > 0) {
                const obj = intersects[0].object.parentGroup || intersects[0].object;
                tooltip.style.opacity = '1';

                tooltip.style.top = clientY + 15 + 'px';
